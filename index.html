<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vanilla JavaScript로 구현한 최신 UI/UX 기반의 모던 테트리스 게임">
    <title>Modern Tetris</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="game-container">
        <!-- 메인 게임 보드 영역 -->
        <main class="board-container">
            <canvas id="tetris-board" width="300" height="600"></canvas>
            <div id="game-over-modal" class="modal hidden">
                <h2>GAME OVER</h2>
                <p>Score: <span id="final-score">0</span></p>
                <button id="restart-btn">Try Again</button>
            </div>
        </main>

        <!-- 사이드 패널 (점수 및 다음 블록 표시) -->
        <aside class="side-panel">
            <div class="panel-box score-box">
                <p class="label">SCORE</p>
                <p class="value" id="score">0</p>
            </div>
            
            <div class="panel-box lines-box">
                <p class="label">LINES</p>
                <p class="value" id="lines">0</p>
            </div>

            <div class="panel-box next-block-box">
                <p class="label">NEXT</p>
                <canvas id="next-block-board" width="120" height="120"></canvas>
            </div>

            <div class="panel-box controls-box">
                <p class="label">CONTROLS</p>
                <ul class="controls-list">
                    <li><span>← / →</span> 이동</li>
                    <li><span>↑</span> 회전</li>
                    <li><span>↓</span> 소프트 드롭</li>
                    <li><span>Space</span> 하드 드롭</li>
                </ul>
            </div>
        </aside>
    </div>

    <!-- 스크립트 모듈 로드 -->
    <!-- GitHub Pages 호환을 위해 상대 경로 사용 -->
    <script src="./tetromino.js"></script>
    <script src="./board.js"></script>
    <script src="./game.js"></script>
</body>
</html>
